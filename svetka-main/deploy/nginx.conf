worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Upstream services
    upstream backend { server 127.0.0.1:8000; }
    upstream admin   { server 127.0.0.1:3000; }
    upstream miniapp { server 127.0.0.1:3001; }

    server {
        listen 8080;
        server_name _;

        # Health check (Koyeb)
        location = /health {
            proxy_pass http://backend/health;
            proxy_set_header Host $host;
        }

        # Telegram webhook
        location = /webhook {
            proxy_pass http://backend/webhook;
            proxy_set_header Host $host;
            proxy_read_timeout 10s;
        }

        # Backend API — всё /api/*
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        # Super Admin Panel — /admin и /admin/*
        # Next.js standalone сам понимает basePath /admin
        location /admin {
            proxy_pass http://admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Поддержка WebSocket для Next.js HMR (не нужно в prod, но безопасно)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Mini App — всё остальное (/)
        location / {
            proxy_pass http://miniapp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
